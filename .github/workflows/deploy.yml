name: Build and Publish Docker Image to GitHub Packages

on:
  release:
    types: [published] # Triggered by release on GitHub

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      # Installs Java 25
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      # Builds Jar-file
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # Support for multi-platform builds (Intel/AMD & Apple Silicon)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login in to GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push container
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/drink-api:latest
            ghcr.io/${{ github.repository_owner }}/drink-api:${{ github.event.release.tag_name }}
          platforms: linux/amd64,linux/arm64
