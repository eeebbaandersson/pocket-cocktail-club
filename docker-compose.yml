services:
# Database service
  db:
    image: mysql:9.5.0
    container_name: cocktail-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cocktail_db
    ports:
      - "3306:3306"
    volumes:
      - cocktail_db_data:/var/lib/mysql

  # Spring Boot application
  app:
    build: . # Tells Docker to use the DockerFile from the same folder
    container_name: cocktail-app
    ports:
      - "8080:8080"
    environment:
       # Variables read by application.properties
      - DB_URL=jdbc:mysql://db:3306/cocktail_db
      - DB_USER=root
      - DB_PASSWORD=root
    depends_on:
      - db

volumes:
  cocktail_db_data:
